<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- Outer circle -->
  <circle cx="11" cy="11" r="9" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Inner tick marks at cardinal points (gap between circle and ticks) -->
  <line x1="11" y1="3.5" x2="11" y2="6"   stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="16" x2="11" y2="18.5" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3.5" y1="11" x2="6"   y2="11" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16"  y1="11" x2="18.5" y2="11" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="11" cy="11" r="1.5" fill="black"/>
</svg>
